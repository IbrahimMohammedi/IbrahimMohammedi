name: Generate pacman animation

on:
  schedule: # execute every 12 hours
    - cron: "0 */12 * * *"

  workflow_dispatch:

  push:
    branches:
    - main

concurrency:
  group: pacman-animation-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: generate pacman-contribution-graph.svg
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: ${{ github.repository_owner }}

      - name: validate generated artifacts
        run: |
          set -euo pipefail
          test -f dist/pacman-contribution-graph.svg
          test -f dist/pacman-contribution-graph-dark.svg
          ls -la dist

      - name: deploy pacman SVGs to the output branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: output
          folder: dist
          clean: true
          single-commit: true
